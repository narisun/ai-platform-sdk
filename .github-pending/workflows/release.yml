name: Release SDK

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -e .[fastapi,postgres-checkpointer]
      - run: pip install pytest pytest-asyncio pyjwt
      - run: pytest tests/unit -v

  build-base-image:
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Extract version
        id: ver
        run: echo "v=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push base image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/base/Dockerfile
          build-args: |
            SDK_VERSION=${{ steps.ver.outputs.v }}
          push: true
          tags: |
            ghcr.io/narisun/ai-python-base:3.11-sdk${{ steps.ver.outputs.v }}
            ghcr.io/narisun/ai-python-base:3.11-sdk-latest
          labels: |
            org.opencontainers.image.version=${{ steps.ver.outputs.v }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
